name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight (UTC)
  workflow_dispatch: # Allows manual runs from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to commit the generated SVGs to the repo

    steps:
      - uses: actions/checkout@v6

      # The default GITHUB_TOKEN is an installation token scoped to this
      # repository only: the stats card queries user-level data (commits,
      # contributions, rank) and fails with "Resource not accessible by
      # integration". STATS_TOKEN is a classic PAT with the read:user scope,
      # stored as a repository secret (Settings > Secrets and variables >
      # Actions).
      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true
          path: profile/stats.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6
          path: profile/top-langs.svg
          token: ${{ secrets.STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
